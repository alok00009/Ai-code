<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOBITA EXPERT V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; font-family: 'Orbitron', sans-serif; }
        .card { border: 1px solid #10b981; background: rgba(15, 23, 42, 0.9); box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-emerald-500">

    <div class="card p-8 rounded-3xl w-full max-w-md text-center">
        <h1 class="text-xl font-bold mb-6 tracking-widest text-white">NOBITA EXPERT V15</h1>
        
        <div class="bg-black/50 py-10 rounded-2xl border border-white/5 mb-6">
            <div id="periodDisplay" class="text-[10px] text-gray-500 mb-2 tracking-widest">PERIOD: --------</div>
            <div id="p_res" class="text-8xl font-black text-white">--</div>
            <div id="p_type" class="text-[10px] text-emerald-400/60 mt-6 uppercase">SYSTEM: STANDBY</div>
        </div>

        <button onclick="fetchAndAnalyze()" class="w-full py-4 bg-emerald-600 text-black font-black rounded-xl hover:bg-white transition-all uppercase text-sm">
            Execute Pattern Scan
        </button>
        <p id="status" class="text-[9px] mt-4 text-gray-700">NO AI - PURE MATHEMATICAL LOGIC</p>
    </div>

    <script src="database.js"></script>
    <script src="logic.js"></script>
    <script src="expert_system.js"></script>
</body>
</html>
